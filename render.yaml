services:
  - type: web
    name: ims-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py bootstrap_admin && gunicorn -c gunicorn.conf.py django_project.wsgi:application
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: ENABLE_SWAGGER
        value: "true"
      - key: FRONTEND_URL
        sync: false 
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
  - type: worker
    name: ims-backend-worker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A django_project worker --loglevel=info
    envVars:
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
  - type: worker
    name: ims-backend-beat
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A django_project beat --loglevel=info
    envVars:
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      
